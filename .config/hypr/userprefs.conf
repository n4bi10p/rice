# Terminal Noir compositor preferences.

general {
    gaps_in = 4
    gaps_out = 6
    border_size = 1
    col.active_border = rgba(2a2a2aff)
    col.inactive_border = rgba(111111ff)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 0

    blur {
        enabled = true
        size = 8
        passes = 2
        ignore_opacity = true
        new_optimizations = true
        noise = 0.01
        contrast = 0.88
        brightness = 0.72
        vibrancy = 0.0
    }

    shadow {
        enabled = false
    }
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    background_color = rgb(000000)
    mouse_move_enables_dpms = true
    allow_session_lock_restore = true
}

dwindle {
    preserve_split = true
}
