# Terminal Noir startup.

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP XDG_CONFIG_HOME QT_QPA_PLATFORMTHEME
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP XDG_CONFIG_HOME QT_QPA_PLATFORMTHEME
exec-once = ~/.config/hypr/scripts/resetxdgportal.sh

exec-once = waybar
exec-once = quickshell --daemonize -p ~/.config/quickshell/shell.qml
exec-once = swaybg -i ~/.config/wall/catwall.png -m fill

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = sh -lc 'command -v hyprpolkitagent >/dev/null 2>&1 && exec hyprpolkitagent; [ -x /usr/lib/hyprpolkitagent ] && exec /usr/lib/hyprpolkitagent; [ -x /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 ] && exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1; exit 0'
exec-once = sh -lc 'command -v nm-applet >/dev/null 2>&1 && nm-applet --indicator'
exec-once = sh -lc 'command -v blueman-applet >/dev/null 2>&1 && blueman-applet'
exec-once = sh -lc 'command -v udiskie >/dev/null 2>&1 && udiskie --no-automount --smart-tray'
exec-once = sh -lc 'command -v swayosd-server >/dev/null 2>&1 && ~/.config/hypr/scripts/swayosd-launch.sh'

exec-once = sh -lc 'if command -v hypridle >/dev/null 2>&1; then systemctl --user start hypridle.service >/dev/null 2>&1 || hypridle -q -c ~/.config/hypr/hypridle.conf; fi'
exec-once = sh -lc 'if command -v hyprsunset >/dev/null 2>&1; then systemctl --user start hyprsunset.service >/dev/null 2>&1 || hyprsunset; fi'
