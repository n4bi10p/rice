# ===========================================================================
# HYPRLOCK CONFIGURATION
# ===========================================================================

general {
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = ~/.config/wall/catwall.png
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 0 # 0 means no blur
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# --- Clock ---
label {
    text = cmd[update:1000] echo "$(date +'%I:%M %p')"
    color = rgba(ffffffdd) # White with slight transparency
    font_size = 80
    font_family = JetBrains Mono
    position = 0, -80 # Slightly above center
    halign = center
    valign = center
}

# --- Date ---
label {
    text = cmd[update:60000] echo "$(date +'%a, %d %b')"
    color = rgba(e0e0e0cc) # Light grey with transparency
    font_size = 20
    font_family = JetBrains Mono
    position = 0, 20 # Below the clock
    halign = center
    valign = center
}

# --- Input Field ---
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of dots in % of height
    dots_spacing = 0.2 # How far apart dots are in % of height
    dots_center = true
    # Hardcoded monochrome
    inner_color = rgb(111111)
    outer_color = rgb(555555) # Border color
    font_color = rgb(ffffff)
    fade_on_empty = false
    placeholder_text = <span foreground="##e0e0e0">Password</span> # Light grey placeholder
    hide_input = false
    check_color = rgb(2a2a2a) # Dark grey for "checking" state
    fail_color = rgb(888888) # Medium grey for "failed" state
    fail_text = <span foreground="##ffffff">Try Again!</span>
    capslock_color = rgb(ffffff) # White for Caps Lock indicator
    numlock_color = rgb(e0e0e0) # Light grey for Num Lock indicator
    
    # CRITICAL: No border-radius
    border_radius = 0
}
