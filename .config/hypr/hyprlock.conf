# ===========================================================================
# HYPRLOCK CONFIGURATION
# ===========================================================================

general {
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = ~/.config/wall/catwall.png
    color = rgba(050505ff)
    blur_passes = 0
    contrast = 0.82
    brightness = 0.35
    vibrancy = 0.0
    vibrancy_darkness = 0.0
}

# --- Lock Icon ---
label {
    text = 
    color = rgba(888888dd)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 105
    halign = center
    valign = center
}

# --- Clock ---
label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(ffffffff)
    font_size = 96
    font_family = JetBrains Mono
    position = 0, 25
    halign = center
    valign = center
}

# --- Date ---
label {
    text = cmd[update:60000] bash -lc "date +'%A, %B %d' | tr '[:lower:]' '[:upper:]' | sed 's/./& /g'"
    color = rgba(777777dd)
    font_size = 16
    font_family = JetBrains Mono
    position = 0, -65
    halign = center
    valign = center
}

# --- Input Field ---
input-field {
    monitor =
    size = 390, 42
    outline_thickness = 1
    dots_size = 0.2 # Scale of dots in % of height
    dots_spacing = 0.2 # How far apart dots are in % of height
    dots_center = true
    # Hardcoded monochrome
    inner_color = rgba(050505cc)
    outer_color = rgb(333333)
    font_color = rgb(ffffff)
    fade_on_empty = false
    placeholder_text = <span foreground="##555555"></span>
    hide_input = false
    check_color = rgb(1c1c1c)
    fail_color = rgb(888888)
    fail_text = <span foreground="##ffffff">Try Again!</span>
    capslock_color = rgb(ffffff)
    numlock_color = rgb(e0e0e0)
    position = 0, -140
    halign = center
    valign = center
    
    # CRITICAL: No border-radius
    border_radius = 0
}
