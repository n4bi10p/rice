# ===========================================================================
# HYPRLOCK CONFIGURATION
# ===========================================================================

general {
    disable_loading_bar = true
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

background {
    monitor =
    path = ~/.config/wall/catwall.png
    color = rgba(050505ff)
    blur_size = 7
    blur_passes = 3
    noise = 0.01
    contrast = 0.75
    brightness = 0.24
    vibrancy = 0.0
    vibrancy_darkness = 0.0
}

# --- Lock Icon ---
label {
    text = 
    color = rgba(b8b8b8dd)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 128
    halign = center
    valign = center
}

# --- Clock ---
label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(f4f4f4ff)
    font_size = 82
    font_family = JetBrains Mono
    position = 0, 46
    halign = center
    valign = center
}

# --- Date ---
label {
    text = cmd[update:60000] bash -lc "date +'%A, %B %d' | tr '[:lower:]' '[:upper:]' | sed 's/./& /g'"
    color = rgba(a0a0a0dd)
    font_size = 13
    font_family = JetBrains Mono
    position = 0, -34
    halign = center
    valign = center
}

# --- Input Field ---
input-field {
    monitor =
    size = 350, 34
    outline_thickness = 1
    dots_size = 0.16
    dots_spacing = 0.28
    dots_center = true
    # Hardcoded monochrome
    inner_color = rgba(050505d9)
    outer_color = rgba(777777b8)
    font_color = rgb(ffffff)
    fade_on_empty = false
    placeholder_text = <span foreground="##555555"></span>
    hide_input = false
    check_color = rgb(1c1c1c)
    fail_color = rgb(888888)
    fail_text = <span foreground="##ffffff">Try Again!</span>
    capslock_color = rgb(ffffff)
    numlock_color = rgb(e0e0e0)
    position = 0, -100
    halign = center
    valign = center
    
    # CRITICAL: No border-radius
    border_radius = 0
    rounding = 0
}
