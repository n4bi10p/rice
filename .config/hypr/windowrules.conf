# Terminal Noir window and layer rules.

windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(wlogout)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on

windowrule = match:float on, center on

windowrule = match:class ^(kitty)$, opacity 0.93 0.90
windowrule = match:class ^(.*Code.*)$, opacity 0.94 0.91
windowrule = match:class ^(VSCodium)$, opacity 0.94 0.91
windowrule = match:class ^(Spotify)$, opacity 0.92 0.88
windowrule = match:class ^(org.kde.dolphin|dolphin)$, opacity 0.92 0.88
windowrule = match:class ^(pavucontrol)$, opacity 0.94 0.90
windowrule = match:class ^(blueman-manager|nm-connection-editor)$, opacity 0.94 0.90
windowrule = match:class ^(qt5ct|qt6ct|kvantummanager)$, opacity 0.94 0.90

layerrule = match:namespace ^(logout_dialog)$, blur on
layerrule = match:namespace ^(logout_dialog)$, ignore_alpha 0.2
layerrule = match:namespace ^(control-center|calendar-panel|clipboard-panel|settings-panel)$, blur on
layerrule = match:namespace ^(control-center|calendar-panel|clipboard-panel|settings-panel)$, ignore_alpha 0.2
