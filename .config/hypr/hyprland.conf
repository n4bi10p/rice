# ===========================================================================
# HYPRLAND CONFIGURATION - MONOCHROME RICE (v0.55+ COMPATIBLE)
# ===========================================================================

# --- MONITOR ---
monitor=eDP-1,1920x1080@144,0x0,1

# --- ENVIRONMENT VARIABLES ---
env = XDG_SESSION_TYPE,wayland
env = MOZ_ENABLE_WAYLAND,1
env = NIXOS_OZONE_WL,1
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland
env = WLR_DRM_DEVICES,/dev/dri/card2:/dev/dri/card1
env = WLR_NO_HARDWARE_CURSORS,1

# --- AUTOSTART ---
exec-once = waybar
exec-once = dunst
exec-once = quickshell -p ~/.config/quickshell/shell.qml
exec-once = swaybg -i ~/.config/wall/catwall.png -m fill
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator

# --- GENERAL APPEARANCE ---
general {
    gaps_in = 4
    gaps_out = 6
    border_size = 1
    col.active_border = rgba(2a2a2aff)
    col.inactive_border = rgba(111111ff)
    layout = dwindle
    allow_tearing = false
}

# --- DECORATION ---
decoration {
    rounding = 0
    
    blur {
        enabled = false
    }
    
    shadow {
        enabled = false
    }
}

# --- INPUT & TOUCHPAD ---
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
    sensitivity = 0
}

# --- MISCELLANEOUS ---
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    background_color = rgb(000000)
    mouse_move_enables_dpms = true
    # vfr is now default, removing to avoid errors
}

# --- WINDOW RULES (NEW v0.55+ SYNTAX) ---
# Format: windowrule = match:<prop> <regex>, <effect> <value>

windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(wlogout)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on

# Center all floating windows
windowrule = match:float on, center on

# --- KEYBINDINGS ---
$mainMod = SUPER

bind = $mainMod, T, exec, kitty
bind = $mainMod, Space, exec, rofi -show drun
bind = $mainMod CTRL, L, exec, hyprlock
bind = $mainMod, M, exec, wlogout

bind = $mainMod, Q, killactive, 
bind = $mainMod, V, togglefloating, 
bind = $mainMod, F, fullscreen,

bind = , Print, exec, grimblast copy area

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
