# ===========================================================================
# KITTY CONFIGURATION
# ===========================================================================

# --- FONT ---
font_family JetBrains Mono
bold_font JetBrains Mono Bold
italic_font JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size 11.0

# --- THEME/COLORS ---
# Hardcoded monochrome palette from your requirements
background #0a0a0a
foreground #e0e0e0

# Black (for compatibility with existing shell themes that might use black)
color0 #000000
color8 #111111

# Red (will appear as a dark gray)
color1 #2a2a2a
color9 #555555

# Green (will appear as a dark gray)
color2 #2a2a2a
color10 #555555

# Yellow (will appear as a dark gray)
color3 #2a2a2a
color11 #555555

# Blue (will appear as a medium gray)
color4 #555555
color12 #888888

# Magenta (will appear as a medium gray)
color5 #555555
color13 #888888

# Cyan (will appear as a medium gray)
color6 #555555
color14 #888888

# White
color7 #e0e0e0
color15 #ffffff

# Cursor color
cursor_text_color #0a0a0a
cursor_shape block
cursor_blink_interval 0

# --- BEHAVIOR ---
# No visual bells
visual_bell_duration 0.0

# Window layout
enabled_layouts splits

# Tab bar
tab_bar_style hidden

# Window borders
window_border_width 2
active_border_color #ffffff #e0e0e0 #888888 #555555 #2a2a2a #1c1c1c #111111 #0a0a0a
inactive_border_color #2a2a2a
# Hide title bar if only one window
hide_window_decorations titlebar-only

# Bell sound
bell_on_bell no

# Mouse
url_style double
copy_on_select yes

# Other visual settings
background_opacity 0.95
