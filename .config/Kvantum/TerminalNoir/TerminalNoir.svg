      .edge { fill: #2a2a2a; }
      .focus { fill: #f4f4f4; }
      .clear { fill: #0b0b0b; fill-opacity: 0; }
    </style>
  </defs>
  <rect id="button-normal" class="panel" x="0" y="0" width="16" height="16"/>
